; https://github.com/uiriansan/SilentSDDM/wiki/Customizing

[General]
scale = 1.0
enable-animations = true
animated-background-placeholder = ""
background-fill-mode = "fill"

[LockScreen]
display = true
padding-top = 0
padding-right = 0
padding-bottom = 0
padding-left = 0
background = ""
use-background-color = true
background-color = "#282828"
blur = 32
brightness = 0.0
saturation = 0.0

[LockScreen.Clock]
display = true
position = "top-center"
align = "center"
format = "hh:mm"
font-family = "RedHatDisplay"
font-size = 70
font-weight = 900
color = "#ebdbb2"

[LockScreen.Date]
display = true
format = "dddd, MMMM dd, yyyy"
locale = "en_GB"
font-family = "RedHatDisplay"
font-size = 14
font-weight = 600
color = "#ebdbb2"
margin-top = -15

[LockScreen.Message]
display = true
position = "bottom-center"
align = "center"
text = "Press any key"
font-family = "RedHatDisplay"
font-size = 12
font-weight = 400
display-icon = true
icon = "enter.svg"
icon-size = 16
color = "#ebdbb2"
paint-icon = true
spacing = 0

[LoginScreen]
background = ""
use-background-color = true
background-color = "#282828"
blur = 16
brightness = 0.0
saturation = 0.0

[LoginScreen.LoginArea]
position = "center"
margin = -1

[LoginScreen.LoginArea.Avatar]
shape = "circle"
border-radius = 35
active-size = 120
inactive-size = 80
inactive-opacity = 0.85
active-border-size = 3
inactive-border-size = 2
active-border-color = "#98971a"
inactive-border-color = "#b8bb26"
always-active = false

[LoginScreen.LoginArea.Username]
font-family = "RedHatDisplay"
font-size = 16
font-weight = 700
color = "#ebdbb2"
margin = 10

[LoginScreen.LoginArea.PasswordInput]
width = 200
height = 30
display-icon = true
font-family = "RedHatDisplay"
font-size = 12
icon = "password.svg"
icon-size = 16
content-color = "#ebdbb2"
background-color = "#3c3836"
background-opacity = 0.85
border-size = 1
border-color = "#98971a"
border-radius-left = 10
border-radius-right = 10
margin-top = 10
masked-character = "●"

[LoginScreen.LoginArea.LoginButton]
background-color = "#3c3836"
background-opacity = 0.85
active-background-color = "#504945"
active-background-opacity = 0.95
icon = "arrow-right.svg"
icon-size = 18
content-color = "#ebdbb2"
active-content-color = "#fbf1c7"
border-size = 1
border-color = "#98971a"
border-radius-left = 10
border-radius-right = 10
margin-left = 5
show-text-if-no-password = true
hide-if-not-needed = false
font-family = "RedHatDisplay"
font-size = 12
font-weight = 600

[LoginScreen.LoginArea.Spinner]
display-text = true
text = "Logging in"
font-family = "RedHatDisplay"
font-weight = 600
font-size = 14
icon-size = 30
icon = "spinner.svg"
color = "#ebdbb2"
spacing = 5

[LoginScreen.LoginArea.WarningMessage]
font-family = "RedHatDisplay"
font-size = 11
font-weight = 400
normal-color = "#ebdbb2"
warning-color = "#ebdbb2"
error-color = "#ebdbb2"
margin-top = 10

[LoginScreen.MenuArea.Buttons]
margin-top = 50
margin-right = 50
margin-bottom = 50
margin-left = 50
size = 30
border-radius = 5
spacing = 10
font-family = "RedHatDisplay"

[LoginScreen.MenuArea.Popups]
max-height = 300
item-height = 30
item-spacing = 2
padding = 5
display-scrollbar = true
margin = 5
background-color = "#3c3836"
background-opacity = 0.75
active-option-background-color = "#504945"
active-option-background-opacity = 0.95
content-color = "#ebdbb2"
active-content-color = "#fbf1c7"
font-family = "RedHatDisplay"
border-size = 1
border-color = "#98971a"
font-size = 11
icon-size = 16

[LoginScreen.MenuArea.Session]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
display-session-name = false
button-width = 200
popup-width = 200
background-color = "#3c3836"
background-opacity = 0.75
active-background-color = "#504945"
active-background-opacity = 0.95
content-color = "#d79921"
active-content-color = "#fabd2f"
border-size = 1
font-size = 10
icon-size = 16

[LoginScreen.MenuArea.Layout]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 180
display-layout-name = true
background-color = "#3c3836"
background-opacity = 0.75
active-background-opacity = 0.95
content-color = "#d79921"
active-content-color = "#fabd2f"
border-size = 1
font-size = 10
icon = "language.svg"
icon-size = 16

[LoginScreen.MenuArea.Keyboard]
display = true
position = "bottom-center"
index = 0
background-color = "#3c3836"
background-opacity = 0.75
active-background-opacity = 0.95
content-color = "#d79921"
active-content-color = "#fabd2f"
border-size = 1
icon = "keyboard.svg"
icon-size = 16

[LoginScreen.MenuArea.Power]
display = true
position = "bottom-center"
index = 0
popup-direction = "up"
popup-align = "center"
popup-width = 100
background-color = "#3c3836"
background-opacity = 0.75
active-background-opacity = 0.95
content-color = "#d79921"
active-content-color = "#fabd2f"
border-size = 1
icon = "power.svg"
icon-size = 16

[Tooltips]
enable = true
font-family = "RedHatDisplay"
font-size = 11
content-color = "#ebdbb2"
background-color = "#282828"
background-opacity = 0.75
border-radius = 5
disable-user = false
disable-login-button = false

[LoginScreen.VirtualKeyboard]
scale = 1.0
position = "login"
start-hidden = true
background-color = "#3c3836"
background-opacity = 0.60
key-color = "#3c3836"
key-opacity = 0.80
key-content-color = "#ebdbb2"
key-active-background-color = "#504945"
key-active-opacity = 0.9
selection-background-color = "#665c54"
selection-content-color = "#ebdbb2"
primary-color = "#3c3836"
border-size = 1
border-color = "#504945"
