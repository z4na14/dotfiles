# ~/.config/fuzzel/fuzzel.ini

# Output/Font settings
font=monospace:size=12
dpi-aware=auto
icon-theme=hicolor
fields=name,generic,comment,exec
terminal=kitty  # Change to your preferred terminal (e.g., alacritty, kitty)

[main]
include = "~/.config/fuzzel/colors.ini"
prompt="❯ "
placeholder="Search..."
sort-result=yes
match-mode=fzf
line-height=18
lines=15
width=40
horizontal-pad=20
vertical-pad=15
inner-pad=10

# Image / Icon layout
image-size-ratio=0.5

[border]
width=2
radius=0

[dmenu]
# Settings used when fuzzel is run in dmenu mode
exit-immediately-if-empty=no
